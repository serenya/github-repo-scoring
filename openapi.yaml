openapi: 3.0.3
info:
  title: GitHub Repository Scoring API
  description: Search and score GitHub repositories by popularity (stars, forks, recency)
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: github-repos
    description: GitHub repository search and scoring

paths:
  /api/v1/github-repos/search:
    get:
      tags:
        - github-repos
      summary: Search and score GitHub repositories
      description: >
        Returns a paginated list of GitHub repositories matching the given filters,
        each enriched with a popularity score (0–100) based on stars, forks, and
        recency of the last update. Results are sorted by score descending.
      operationId: searchRepositories
      parameters:
        - name: language
          in: query
          required: false
          description: Filter repositories by programming language (case-insensitive)
          schema:
            type: string
            example: TypeScript
        - name: created_after
          in: query
          required: false
          description: Only include repositories created after this date (ISO 8601)
          schema:
            type: string
            format: date
            example: '2020-01-01'
        - name: page
          in: query
          required: false
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
      responses:
        '200':
          description: Paginated list of scored repositories, sorted by popularity score descending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRepositoriesResponse'
              example:
                items:
                  - language: TypeScript
                    url: https://github.com/nestjs/nest
                    score: 82
                    created_at: '2017-02-04T00:00:00.000Z'
                  - language: TypeScript
                    url: https://github.com/microsoft/TypeScript
                    score: 79
                    created_at: '2014-06-19T00:00:00.000Z'
                meta:
                  total: 3
                  page: 1
                  per_page: 10
                  total_pages: 1
                links:
                  self: 'http://localhost:3000/api/v1/github-repos/search?language=TypeScript&per_page=10&page=1'
                  first: 'http://localhost:3000/api/v1/github-repos/search?language=TypeScript&per_page=10&page=1'
                  last: 'http://localhost:3000/api/v1/github-repos/search?language=TypeScript&per_page=10&page=1'
                  next: null
                  prev: null
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                statusCode: 400
                message:
                  - page must not be less than 1
                  - per_page must not be greater than 100
                error: Bad Request
        '503':
          description: GitHub API is unavailable (network failure, rate limit exceeded, or circuit breaker open)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 503
                message: GitHub API is unavailable
                error: Service Unavailable
        '504':
          description: GitHub API did not respond within the configured timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 504
                message: GitHub API request timed out
                error: Gateway Timeout

components:
  schemas:
    RepositoryResponse:
      type: object
      required:
        - language
        - url
        - score
        - created_at
      properties:
        language:
          type: string
          nullable: true
          description: Primary programming language
          example: TypeScript
        url:
          type: string
          format: uri
          description: URL to the repository on GitHub
          example: https://github.com/nestjs/nest
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Popularity score (0–100), average of stars, forks, and recency sub-scores
          example: 82
        created_at:
          type: string
          format: date-time
          description: Repository creation timestamp (ISO 8601)
          example: '2017-02-04T00:00:00.000Z'

    PaginationMeta:
      type: object
      required:
        - total
        - page
        - per_page
        - total_pages
      properties:
        total:
          type: integer
          minimum: 0
          description: Total number of matching repositories
          example: 8
        page:
          type: integer
          minimum: 1
          description: Current page number
          example: 1
        per_page:
          type: integer
          minimum: 1
          maximum: 100
          description: Items per page
          example: 10
        total_pages:
          type: integer
          minimum: 0
          description: Total number of pages
          example: 1

    PaginationLinks:
      type: object
      required:
        - self
        - first
        - last
        - next
        - prev
      properties:
        self:
          type: string
          format: uri
          description: URL of the current page
        first:
          type: string
          format: uri
          description: URL of the first page
        last:
          type: string
          format: uri
          nullable: true
          description: URL of the last page, or null when there are no results
        next:
          type: string
          format: uri
          nullable: true
          description: URL of the next page, or null when on the last page
        prev:
          type: string
          format: uri
          nullable: true
          description: URL of the previous page, or null when on the first page

    PaginatedRepositoriesResponse:
      type: object
      required:
        - items
        - meta
        - links
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RepositoryResponse'
          description: Repositories sorted by score descending
        meta:
          $ref: '#/components/schemas/PaginationMeta'
        links:
          $ref: '#/components/schemas/PaginationLinks'

    ValidationErrorResponse:
      type: object
      required:
        - statusCode
        - message
        - error
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: array
          items:
            type: string
          description: List of validation error messages
          example:
            - page must not be less than 1
        error:
          type: string
          example: Bad Request

    ErrorResponse:
      type: object
      required:
        - statusCode
        - message
        - error
      properties:
        statusCode:
          type: integer
          example: 503
        message:
          type: string
          description: Human-readable error description
          example: GitHub API is unavailable
        error:
          type: string
          example: Service Unavailable
